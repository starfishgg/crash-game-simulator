<!DOCTYPE html>
<html>
    <head>
        <title>Crash Game Simulation</title>
        <link rel="stylesheet" href="styles.css">
        <script defer src="crash.js"></script>
    </head>
<body>
    <h1>🚀 Crash Game Simulation</h1>
    <h2>💰 Balance: €<span id="balance">10.00</span></h2>
    <h2>💸 Cost to play: €<span id="cost">10.00</span></h2>
    <div id="multiplier">1.00x</div>

    <button onclick="startRound();">Start Round</button>
    <button onmousedown="cashOut();">Cash Out</button>

    <p id="result"></p>
</body>
</html>
